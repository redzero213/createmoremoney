<!DOCTYPE html>
<html lang="zh-HK" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>回贈哥 v3.0 - 雲端聯動版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        // 已整合你提供的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyDqRIU7FTjapGmJK6n1Nty_-qJFLXm9JBo",
            authDomain: "createmoremoney-94aa2.firebaseapp.com",
            projectId: "createmoremoney-94aa2",
            storageBucket: "createmoremoney-94aa2.firebasestorage.app",
            messagingSenderId: "460518489963",
            appId: "1:460518489963:web:1a15fd52a19b3a3251962e",
            measurementId: "G-1KLFPE4SDS"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = 'rebate-bro-v3';

        // 核心狀態
        let state = {
            transactions: [],
            cards: [
                { id: 'cash', name: '💵 現金 / 無回贈', rate: 0, type: 'cash', paid: true },
                { id: 'red', name: 'HSBC Red', rate: 4, type: 'cash', paid: false },
                { id: 'waku', name: 'Waku Waku', rate: 6, type: 'cash', paid: false }
            ],
            lastUpdated: 0
        };

        let user = null;
        let currentTab = 'expense';

        // --- Auth 邏輯 ---
        window.loginWithGoogle = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                showToast("登入失敗: " + e.message, "error");
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                document.getElementById('auth-status').innerHTML = `
                    <div class="flex items-center gap-2">
                        <img src="${user.photoURL || 'https://via.placeholder.com/24'}" class="w-5 h-5 rounded-full border border-green-500">
                        <span class="text-green-400 font-bold">${user.displayName || '已同步'}</span>
                    </div>`;
                subscribeToData();
            } else {
                document.getElementById('auth-status').innerHTML = `
                    <button onclick="loginWithGoogle()" class="text-[10px] bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded-full transition-all flex items-center gap-1">
                        <i class="fab fa-google"></i> 登入同步雲端
                    </button>`;
            }
        });

        function subscribeToData() {
            if (!user) return;
            // 遵循路徑規則: /artifacts/{appId}/users/{userId}/{collectionName}
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'appState', 'main');
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.lastUpdated > state.lastUpdated) {
                        state = data;
                        renderAll();
                    }
                } else {
                    saveToCloud();
                }
            }, (err) => {
                console.error("Firestore Error:", err);
                showToast("雲端讀取失敗", "error");
            });
        }

        async function saveToCloud() {
            if (!user) return;
            state.lastUpdated = Date.now();
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'appState', 'main');
            try {
                await setDoc(docRef, state);
                showToast("☁️ 數據已自動同步");
            } catch (e) {
                console.error("Save Error:", e);
                showToast("同步失敗", "error");
            }
        }

        // --- 業務邏輯 ---
        window.addExpense = async () => {
            const desc = document.getElementById('exp-desc').value;
            const amountStr = document.getElementById('exp-amount').value;
            const amount = parseFloat(amountStr);
            const cardId = document.getElementById('exp-card').value;
            
            if (!desc || !amountStr || isNaN(amount)) {
                showToast("請輸入有效名稱同金額", "error");
                return;
            }

            const card = state.cards.find(c => c.id == cardId);
            let rebateText = "";
            if (card.type === 'miles') {
                const miles = Math.floor(amount / card.rate);
                rebateText = `${miles} 里`;
            } else {
                const rebate = (amount * (card.rate / 100)).toFixed(1);
                rebateText = `$${rebate}`;
            }

            state.transactions.unshift({
                id: Date.now(),
                date: new Date().toLocaleDateString(),
                desc,
                amount,
                cardName: card.name,
                rebateText,
                isSettled: false
            });

            document.getElementById('exp-desc').value = '';
            document.getElementById('exp-amount').value = '';
            renderAll();
            await saveToCloud();
        };

        window.toggleSettle = async (id) => {
            const tx = state.transactions.find(t => t.id === id);
            if (tx) tx.isSettled = !tx.isSettled;
            renderAll();
            await saveToCloud();
        };

        window.deleteTx = async (id) => {
            if(!confirm('確定刪除此紀錄？')) return;
            state.transactions = state.transactions.filter(t => t.id !== id);
            renderAll();
            await saveToCloud();
        };

        window.switchTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('text-green-400', 'bg-gray-800/50'));
            event.currentTarget.classList.add('text-green-400', 'bg-gray-800/50');
        };

        function renderAll() {
            // 渲染列表
            const list = document.getElementById('tx-list');
            if (state.transactions.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-gray-600 text-sm">暫無簽賬紀錄</div>`;
            } else {
                list.innerHTML = state.transactions.map(t => `
                    <div class="bg-gray-800/40 backdrop-blur-sm p-4 rounded-2xl mb-3 flex justify-between items-center transition-all ${t.isSettled ? 'opacity-40 grayscale border-l-4 border-green-500' : 'border-l-4 border-transparent shadow-lg shadow-black/20'}">
                        <div onclick="toggleSettle(${t.id})" class="flex-1 cursor-pointer">
                            <div class="font-bold text-white flex items-center gap-2">
                                ${t.isSettled ? '<i class="fas fa-check-circle text-green-500"></i>' : ''}
                                <span class="${t.isSettled ? 'line-through' : ''}">${t.desc}</span>
                            </div>
                            <div class="text-[10px] text-gray-500 mt-1">${t.date} • ${t.cardName}</div>
                        </div>
                        <div class="text-right flex flex-col items-end gap-1">
                            <div class="text-white font-mono font-black">$${t.amount.toLocaleString()}</div>
                            <div class="text-[10px] font-bold px-2 py-0.5 rounded bg-blue-500/10 text-blue-400">${t.rebateText}</div>
                            ${!t.isSettled ? `<button onclick="deleteTx(${t.id})" class="text-[10px] text-red-900/50 hover:text-red-500 mt-1">刪除</button>` : ''}
                        </div>
                    </div>
                `).join('');
            }

            // 渲染卡片選單
            const cardSelect = document.getElementById('exp-card');
            cardSelect.innerHTML = state.cards.map(c => `<option value="${c.id}">${c.name} (${c.type === 'miles' ? '$'+c.rate+'/里' : c.rate+'%'})</option>`).join('');
            
            // 統計未找總額
            const total = state.transactions.filter(t => !t.isSettled).reduce((a, b) => a + b.amount, 0);
            document.getElementById('total-unsettled').innerText = `$${total.toLocaleString()}`;
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed top-6 left-1/2 -translate-x-1/2 px-6 py-2 rounded-full text-white text-xs font-bold z-[9999] transition-all duration-300 shadow-2xl ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            setTimeout(() => t.className = 'hidden', 2000);
        }

        window.onload = () => { renderAll(); };
    </script>
    <style>
        body { background: #0b0f1a; color: #e2e8f0; -webkit-user-select: none; font-family: -apple-system, system-ui, sans-serif; }
        ::-webkit-scrollbar { display: none; }
        .tab-content { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        input, select { -webkit-appearance: none; }
        .safe-bottom { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom)); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <div id="toast" class="hidden"></div>

    <!-- Header -->
    <header class="p-6 pt-14 bg-gray-900/80 backdrop-blur-xl border-b border-white/5 flex justify-between items-end sticky top-0 z-50">
        <div>
            <h1 class="text-2xl font-black text-white tracking-tighter italic">REBATE BRO <span class="text-green-500 not-italic text-xs ml-1">v3.0</span></h1>
            <div id="auth-status" class="mt-1"></div>
        </div>
        <div class="text-right">
            <p class="text-[9px] text-gray-500 uppercase tracking-[0.2em] font-bold">未找數金額</p>
            <p id="total-unsettled" class="text-2xl font-black text-white font-mono">$0</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-4 pb-32">
        
        <!-- Tab: Expense (記帳) -->
        <div id="tab-expense" class="tab-content">
            <div class="bg-gradient-to-br from-gray-800 to-gray-900 p-5 rounded-[2rem] border border-white/10 mb-8 shadow-2xl">
                <div class="flex flex-col gap-4">
                    <div class="grid grid-cols-5 gap-3">
                        <input id="exp-desc" type="text" placeholder="項目名稱" class="col-span-3 bg-black/40 border-none rounded-2xl p-4 text-white placeholder-gray-600 focus:ring-1 ring-green-500 outline-none transition-all">
                        <input id="exp-amount" type="number" inputmode="decimal" placeholder="金額" class="col-span-2 bg-black/40 border-none rounded-2xl p-4 text-white font-mono text-center focus:ring-1 ring-green-500 outline-none transition-all">
                    </div>
                    <div class="relative">
                        <select id="exp-card" class="w-full bg-black/40 border-none rounded-2xl p-4 text-white outline-none cursor-pointer pr-10"></select>
                        <i class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-600 pointer-events-none"></i>
                    </div>
                    <button onclick="addExpense()" class="w-full bg-green-500 hover:bg-green-400 py-4 rounded-2xl text-black font-black text-lg shadow-[0_10px_30px_-10px_rgba(34,197,94,0.5)] active:scale-[0.97] transition-all">
                        🚀 記錄簽賬
                    </button>
                </div>
            </div>

            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest">最近紀錄</h3>
                <span class="text-[10px] text-gray-600">撳一下項目找數</span>
            </div>
            
            <div id="tx-list"></div>
        </div>

        <!-- Tab: Toolbox (工具箱) -->
        <div id="tab-tools" class="tab-content hidden">
            <h2 class="text-xl font-black mb-6 flex items-center gap-2 px-2">
                <i class="fas fa-toolbox text-blue-500"></i> 百寶箱
            </h2>
            <div class="space-y-4">
                <div class="p-2 bg-blue-500/10 rounded-xl mb-4">
                    <p class="text-[10px] text-blue-400 font-bold px-2">銀行熱線 (一撳即撥)</p>
                </div>
                <div class="grid grid-cols-1 gap-3">
                    <a href="tel:22333000" class="bg-gray-800/40 p-5 rounded-2xl flex justify-between items-center border border-white/5 hover:bg-gray-800/60 transition-all group">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center text-red-500 font-bold">H</div>
                            <div>
                                <div class="font-bold text-white">滙豐 HSBC</div>
                                <div class="text-[10px] text-gray-500">卓越理財熱線</div>
                            </div>
                        </div>
                        <i class="fas fa-phone text-green-500 group-hover:scale-125 transition-transform"></i>
                    </a>
                    <a href="tel:28220228" class="bg-gray-800/40 p-5 rounded-2xl flex justify-between items-center border border-white/5 hover:bg-gray-800/60 transition-all group">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-red-700/20 flex items-center justify-center text-red-700 font-bold">B</div>
                            <div>
                                <div class="font-bold text-white">中銀 BOC</div>
                                <div class="text-[10px] text-gray-500">信用卡客服</div>
                            </div>
                        </div>
                        <i class="fas fa-phone text-green-500 group-hover:scale-125 transition-transform"></i>
                    </a>
                    <div class="h-px bg-white/5 my-4"></div>
                    <p class="text-[10px] text-blue-400 font-bold px-2 mb-2">常用登記 Link</p>
                    <a href="https://www.redhotoffers.hsbc.com.hk/tc/latest-offers/reward-plus/registration/" target="_blank" class="bg-gray-800/40 p-5 rounded-2xl flex justify-between items-center border border-white/5 hover:bg-gray-800/60 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center text-white"><i class="fas fa-link"></i></div>
                            <div class="font-bold text-white">HSBC Reward+ 登記頁</div>
                        </div>
                        <i class="fas fa-external-link-alt text-gray-600"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Tab: Settings (設定) -->
        <div id="tab-settings" class="tab-content hidden">
             <div class="bg-gray-800/40 p-6 rounded-3xl border border-white/5 text-center">
                 <i class="fas fa-cloud-check text-4xl text-green-500 mb-4"></i>
                 <h3 class="font-bold text-lg">雲端同步狀態</h3>
                 <p class="text-xs text-gray-500 mt-2">所有數據會自動加密並上傳至 Firebase 雲端資料庫。更換裝置只需登入 Google 即可同步。</p>
                 <button onclick="auth.signOut().then(()=>location.reload())" class="mt-6 text-xs text-red-500 border border-red-500/30 px-4 py-2 rounded-xl">登出帳號</button>
             </div>
        </div>
    </main>

    <!-- Navigation Bar -->
    <nav class="fixed bottom-0 w-full bg-gray-900/90 backdrop-blur-2xl border-t border-white/5 flex justify-around items-center px-4 safe-bottom z-50">
        <button onclick="switchTab('expense')" class="nav-item text-green-400 bg-gray-800/50 p-3 rounded-2xl transition-all flex flex-col items-center min-w-[64px]">
            <i class="fas fa-receipt text-lg"></i>
            <span class="text-[9px] mt-1 font-black uppercase">記帳</span>
        </button>
        <button onclick="switchTab('cards')" class="nav-item text-gray-600 p-3 rounded-2xl transition-all flex flex-col items-center min-w-[64px]">
            <i class="fas fa-wallet text-lg"></i>
            <span class="text-[9px] mt-1 font-black uppercase">卡包</span>
        </button>
        <button onclick="switchTab('tools')" class="nav-item text-gray-600 p-3 rounded-2xl transition-all flex flex-col items-center min-w-[64px]">
            <i class="fas fa-layer-group text-lg"></i>
            <span class="text-[9px] mt-1 font-black uppercase">工具</span>
        </button>
        <button onclick="switchTab('settings')" class="nav-item text-gray-600 p-3 rounded-2xl transition-all flex flex-col items-center min-w-[64px]">
            <i class="fas fa-fingerprint text-lg"></i>
            <span class="text-[9px] mt-1 font-black uppercase">我的</span>
        </button>
    </nav>

</body>
</html>
